            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete my media subtree
      tags:
      - Media
    get:
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Get my media by id
      tags:
      - Media
    put:
      consumes:
      - application/json
      parameters:
      - description: Media id
        in: path
        name: id
        required: true
        type: integer
      - description: New name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.UpdateMediaBody'
      produces:
      - application/json
      responses:
        "200":
