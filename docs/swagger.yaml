  /api/v1/categories:
    get:
      parameters:
      - description: Page (1-based)
        in: query
        name: page
        type: integer
      - description: Page size (max 200)
        in: query
        name: limit
        type: integer
      - description: Filter by name (contains)
        in: query
        name: name
        type: string
      - description: Search in name (contains)
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: List categories (flat, tree order by lft)
      tags:
      - Categories
  /api/v1/categories/{id}:
    delete:
      description: Soft-deletes the category and all descendants (sets deleted_at
        / deleted_by) and rebalances nested-set indices on active rows. Blocked if
        any post references a category in this subtree.
      parameters:
      - description: Category id (root of subtree to remove)
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Envelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete category subtree
      tags:
      - Categories
    put:
      consumes:
      - application/json
      parameters:
      - description: Category id
        in: path
        name: id
        required: true
        type: integer
      - description: New name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.UpdateCategoryBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Update category name
      tags:
      - Categories
  /api/v1/categories/{id}/child:
    post:
      consumes:
      - application/json
      parameters:
      - description: Parent category id
        in: path
        name: id
        required: true
        type: integer
      - description: Child category name
