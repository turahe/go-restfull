        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Verify 2FA challenge and issue tokens
      tags:
      - Auth
  /api/v1/auth/email/change:
    post:
      consumes:
      - application/json
      parameters:
      - description: Change email payload
