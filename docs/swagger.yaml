basePath: /
definitions:
  request.AddPermissionRequest:
    properties:
      act:
        maxLength: 50
        minLength: 1
        type: string
      obj:
        maxLength: 200
        minLength: 1
        type: string
      role:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - act
    - obj
    - role
    type: object
  request.AssignRoleRequest:
    properties:
      role:
        maxLength: 50
        minLength: 2
        type: string
      userId:
        type: integer
    required:
    - role
    - userId
    type: object
  request.ChangeEmailRequest:
    properties:
      currentPassword:
        maxLength: 72
        minLength: 8
        type: string
      newEmail:
        maxLength: 190
        type: string
    required:
    - currentPassword
    - newEmail
    type: object
  request.ChangePasswordRequest:
    properties:
      currentPassword:
        maxLength: 72
        minLength: 8
        type: string
      newPassword:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - currentPassword
    - newPassword
    type: object
  request.CreateCategoryChildBody:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  request.CreateCategoryRootBody:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  request.CreateCommentRequest:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
      tagIds:
        items:
          type: integer
        type: array
    required:
    - content
    type: object
  request.CreateMediaFolderChildBody:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - name
    type: object
  request.CreateMediaFolderRootBody:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - name
    type: object
  request.CreatePostRequest:
    properties:
      canonicalUrl:
        maxLength: 512
        type: string
      categoryId:
        type: integer
      content:
        minLength: 1
        type: string
      excerpt:
        description: SEO (optional)
        maxLength: 2000
        type: string
      layout:
        enum:
        - simple
        - author
        - book
        - list
        type: string
      metaDescription:
        maxLength: 320
        type: string
      metaTitle:
        maxLength: 200
        type: string
      ogImageUrl:
        maxLength: 512
        type: string
      robotsMeta:
        maxLength: 100
        type: string
      status:
        enum:
        - draft
        - published
        - archived
        type: string
      tagIds:
        items:
          type: integer
        type: array
      title:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - categoryId
    - content
    - title
    type: object
  request.CreateRoleRequest:
    properties:
      name:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - name
    type: object
  request.CreateTagRequest:
    properties:
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  request.CreateUserRequest:
    properties:
      confirmPassword:
        type: string
      email:
        maxLength: 190
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      roleId:
        description: RoleID references roles.id (see model.Role). When omitted, the
          service assigns the default "user" role (entities.RoleUser) by resolving
          it in the database.
        type: integer
    required:
    - confirmPassword
    - email
    - name
    - password
    type: object
  request.ImpersonateRequest:
    properties:
      deviceId:
        maxLength: 64
        minLength: 4
        type: string
      reason:
        maxLength: 255
        minLength: 5
        type: string
      userId:
        type: integer
    required:
    - deviceId
    - reason
    - userId
    type: object
  request.LoginRequest:
    properties:
      deviceId:
        maxLength: 64
        minLength: 4
        type: string
      email:
        maxLength: 190
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - deviceId
    - email
    - password
    type: object
  request.RefreshRequest:
    properties:
      deviceId:
        maxLength: 64
        minLength: 4
        type: string
      refreshToken:
        maxLength: 200
        minLength: 10
        type: string
    required:
    - deviceId
    - refreshToken
    type: object
  request.RegisterRequest:
    properties:
      email:
        maxLength: 190
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  request.TwoFAEnableRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  request.TwoFAVerifyRequest:
    properties:
      challengeId:
        type: string
      code:
        type: string
      deviceId:
        maxLength: 64
        minLength: 4
        type: string
    required:
    - challengeId
    - code
    - deviceId
    type: object
  request.UpdateCategoryBody:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  request.UpdateCommentBody:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - content
    type: object
  request.UpdateMediaBody:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - name
    type: object
  request.UpdatePostRequest:
    properties:
      canonicalUrl:
        maxLength: 512
        type: string
      categoryId:
        type: integer
      content:
        minLength: 1
        type: string
      excerpt:
        description: 'SEO: use pointers so JSON null/absence can mean "no change";
          present string (including "") updates/clears.'
        maxLength: 2000
        type: string
      layout:
        enum:
        - simple
        - author
        - book
        - list
        type: string
      metaDescription:
        maxLength: 320
        type: string
      metaTitle:
        maxLength: 200
        type: string
      ogImageUrl:
        maxLength: 512
        type: string
      robotsMeta:
        maxLength: 100
        type: string
      status:
        enum:
        - draft
        - published
        - archived
        type: string
      tagIds:
        items:
          type: integer
        type: array
      title:
        maxLength: 200
        minLength: 3
        type: string
    type: object
  request.UpdateTagRequest:
    properties:
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  response.Envelope:
    properties:
      code:
        type: integer
      data: {}
      error: {}
      message:
        type: string
      next:
        type: boolean
      nextCursor:
        description: Cursor-specific fields are optional and used by some pagination
          styles.
        type: string
      prev:
        type: boolean
      prevCursor:
        type: string
    type: object
info:
  contact: {}
  description: Blog API with JWT auth, posts, and comments.
  title: Blog REST API
  version: "1.0"
paths:
  /api/v1/auth/2fa/enable:
    post:
      consumes:
      - application/json
      parameters:
      - description: Enable 2FA payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.TwoFAEnableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Enable TOTP 2FA for current user
      tags:
      - Auth
  /api/v1/auth/2fa/setup:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
