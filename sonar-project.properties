sonar.projectKey=go-rest
sonar.projectName=go-rest
sonar.sourceEncoding=UTF-8

# Analyze the whole repository.
sonar.sources=.

# Exclude generated docs and build artifacts.
sonar.exclusions=docs/**,**/*_test.go,**/*.md,**/tmp/**,**/vendor/**

# Keep tests indexed for Sonar test metrics.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go coverage report generated in CI.
sonar.go.coverage.reportPaths=coverage.out
