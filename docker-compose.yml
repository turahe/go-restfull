services:
  mysql:
    image: mysql:8.4
    container_name: go-rest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-rest-api
    environment:
      APP_ENV: local
      SERVER_PORT: "8080"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: blog
      DB_PASSWORD: blog
      DB_NAME: blog
      JWT_PRIVATE_KEY_PATH: keys/jwtRS256.key
      JWT_PUBLIC_KEY_PATH: keys/jwtRS256.key.pub
      JWT_ISSUER: go-rest-blog
      JWT_TTL_MINUTES: "120"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

