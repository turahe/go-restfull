services:
  mysql:
    image: mysql:8.4
    container_name: go-rest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    container_name: go-rest-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-rest-api
    environment:
      APP_ENV: local
      SERVER_PORT: "8080"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      RATE_LIMIT_KEY_PREFIX: "rl:ip:"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: blog
      DB_PASSWORD: blog
      DB_NAME: blog
      JWT_PRIVATE_KEY_PATH: keys/jwtRS256.key
      JWT_PUBLIC_KEY_PATH: keys/jwtRS256.key.pub
      JWT_ISSUER: go-rest-blog
      JWT_AUDIENCE: blog-api
      JWT_KEY_ID: k1
      ACCESS_TOKEN_TTL_MINUTES: "10"
      REFRESH_TOKEN_TTL_DAYS: "30"
      REFRESH_TOKEN_PEPPER: "change_me_strong_secret"
      IMPERSONATION_TTL_MINUTES: "5"
      CASBIN_MODEL_PATH: configs/casbin_model.conf
      TWO_FACTOR_ENC_KEY: "0123456789abcdef0123456789abcdef"
      TWO_FACTOR_ISSUER: "go-rest-blog"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data:
  redis_data:

